name: Import Lore

on:
  push:
    paths:
      - "Nalfa.lore"

permissions:
  contents: write

jobs:
  import-lore:
    if: github.event.head_commit.message == 'Add files via upload'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unpack current compendiums
        run: node lore_extract/unpack-compendiums.mjs .pack-before

      - name: Validate lore file
        run: npm run validate:lore

      - name: Build compendium
        run: npm run import:lore

      - name: Unpack generated compendiums
        run: node lore_extract/unpack-compendiums.mjs .pack-after

      - name: Write compendium changes
        run: node lore_extract/write-compendium-changes.mjs .pack-before .pack-after

      - name: Check generated files
        run: git diff --check

      - name: Commit generated compendium
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --soft HEAD^
          git rm --ignore-unmatch Nalfa.lore
          git add packs
          if [ -f packs/CHANGES.txt ]; then
            summary="$(tr -d '\r\n' < packs/CHANGES.txt)"
          else
            summary="Failed to Update Compendium"
          fi
          git commit --allow-empty -m "Updated Compendium: ${summary}"
          git push --force-with-lease origin "HEAD:${GITHUB_REF_NAME}"
