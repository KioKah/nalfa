name: Import Lore

on:
  push:
    paths:
      - "Nalfa.lore"

jobs:
  import-lore:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate lore file
        run: npm run validate:lore

      - name: Build compendium
        run: npm run import:lore

      - name: Check generated files
        run: git diff --check
