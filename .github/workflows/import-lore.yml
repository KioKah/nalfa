name: Import Lore

on:
  push:
    paths:
      - "Nalfa.lore"

permissions:
  contents: write

jobs:
  import-lore:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate lore file
        run: npm run validate:lore

      - name: Build compendium
        run: npm run import:lore

      - name: Check generated files
        run: git diff --check

      - name: Commit generated compendium
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packs
          if git diff --cached --quiet; then
            echo "Compendium is unchanged."
          else
            git commit -m "chore: update creatures compendium"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
